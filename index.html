<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davimed - Premium Field Reporter Pro</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- html2pdf.js for local PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="ph-fill ph-first-aid text-blue"></i>
                <span class="logo-text">DAVIMED</span>
            </div>
            <div class="nav-actions">
                <button id="view-history-btn" class="btn-icon-text">
                    <i class="ph ph-clock-counter-clockwise"></i> History
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="main-container" id="reporter-view">
        
        <!-- Report Basic Info -->
        <section class="card mb-6">
            <div class="section-header">
                <i class="ph ph-info"></i>
                <h2>General Information</h2>
            </div>
            <div class="meta-grid">
                <div class="form-group">
                    <label>Report Date</label>
                    <div class="input-icon-box">
                        <i class="ph ph-calendar"></i>
                        <input type="text" id="report-date" placeholder="e.g. 3rd, April 2026">
                    </div>
                </div>
                <div class="form-group">
                    <label>Work Area</label>
                    <div class="input-icon-box">
                        <i class="ph ph-map-pin"></i>
                        <input type="text" id="report-area" placeholder="e.g. Kampala Central">
                    </div>
                </div>
            </div>
        </section>

        <!-- Facilities Section -->
        <section id="facilities-list" class="mb-6">
            <div class="flex-between mb-4">
                <h2 class="section-title"><i class="ph ph-buildings"></i> Facilities Visited</h2>
                <span class="badge" id="facility-count">0 Facilities</span>
            </div>
            <div id="facilities-container">
                <!-- Facility Cards injected here -->
            </div>
            <button id="add-facility-btn" class="btn btn-outline btn-full card">
                <i class="ph ph-plus"></i> Add New Facility
            </button>
        </section>

        <!-- General Conclusion -->
        <section class="card mb-6">
            <div class="section-header">
                <i class="ph ph-notebook"></i>
                <h2>General Conclusion</h2>
            </div>
            <textarea id="report-conclusion" rows="4" placeholder="Any final remarks..."></textarea>
        </section>

        <!-- Action Bar -->
        <div class="action-bar-fixed">
            <div class="action-grid">
                <button id="export-pdf-btn" class="btn btn-primary">
                    <i class="ph ph-file-pdf"></i> Generate PDF Report
                </button>
                <button id="save-report-btn" class="btn btn-secondary">
                    <i class="ph ph-floppy-disk"></i> Save to History
                </button>
            </div>
        </div>
    </main>

    <!-- History View (Overlay) -->
    <div id="history-overlay" class="overlay">
        <div class="overlay-content">
            <div class="overlay-header">
                <h2><i class="ph ph-clock-counter-clockwise"></i> Saved Reports</h2>
                <button id="close-history-btn" class="btn-icon"><i class="ph ph-x"></i></button>
            </div>
            <div id="history-list" class="history-list">
                <!-- History Items -->
            </div>
        </div>
    </div>

    <!-- Hidden PDF Template -->
    <div id="pdf-template" style="display:none;">
        <div class="pdf-report">
            <div class="pdf-header">
                <h1>DAVIMED</h1>
                <p>DAILY FIELD REPORT</p>
                <div class="pdf-meta">
                    <p><strong>Date:</strong> <span id="pdf-date"></span></p>
                    <p><strong>Area:</strong> <span id="pdf-area"></span></p>
                </div>
            </div>
            <div id="pdf-body"></div>
            <div class="pdf-conclusion">
                <h3>General Conclusion:</h3>
                <p id="pdf-conclusion-text"></p>
            </div>
        </div>
    </div>

    <!-- Templates -->
    <template id="facility-template">
        <div class="facility-card card mb-4">
            <div class="card-header flex-between">
                <h3>Facility #<span class="fac-idx"></span></h3>
                <button class="btn-icon text-danger remove-fac-btn"><i class="ph ph-trash"></i></button>
            </div>
            <div class="form-group mb-4">
                <label>Facility Name</label>
                <input type="text" class="fac-name" placeholder="Facility Name...">
            </div>
            <div class="form-group mb-4">
                <label>Type of Facility</label>
                <select class="fac-type">
                    <option value="Pharmacy">Pharmacy</option>
                    <option value="Hospital">Hospital / Medical Center</option>
                    <option value="Clinic">Clinic</option>
                </select>
            </div>
            
            <div class="doctors-section">
                <div class="flex-between mb-2">
                    <label>Doctor(s) / Personnel Contacted</label>
                    <button class="btn-text add-doc-btn">+ Add Person</button>
                </div>
                <div class="doctors-container"></div>
            </div>
        </div>
    </template>

    <template id="doctor-template">
        <div class="doctor-subcard mb-3">
            <div class="flex-between mb-2">
                <span class="sub-label">Person <span class="doc-idx"></span></span>
                <button class="btn-icon-sm remove-doc-btn"><i class="ph ph-minus"></i></button>
            </div>
            <div class="doc-form-grid">
                <input type="text" class="doc-name" placeholder="Name: Dr. X">
                <input type="text" class="doc-phone" placeholder="Phn No: 07xxx">
            </div>
            <textarea class="doc-remarks" rows="2" placeholder="What they said / Remarks..."></textarea>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
